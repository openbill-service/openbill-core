site_name: Openbill Core Docs
site_description: "Openbill Core: Надежный биллинг на уровне базы данных."
site_url: https://openbill-service.github.io/openbill-core/
repo_url: https://github.com/openbill-service/openbill-core
repo_name: openbill-service/openbill-core
edit_uri: edit/master/docs/

theme:
  name: material
  language: ru
  features:
    - navigation.instant
    - navigation.top
    - content.code.copy
    - content.action.edit

nav:
  - Главная: index.md
  - Быстрый старт: getting-started.md
  - Глоссарий: glossary.md
  - Отраслевые примеры:
      - Каталог examples: examples/README.md
      - Marketplace: examples/marketplace/README.md
      - SaaS Subscriptions: examples/saas-subscriptions/README.md
      - P2P Wallet: examples/p2p-wallet/README.md
      - Donations: examples/donations/README.md
      - Gift Cards: examples/gift-cards/README.md
      - Affiliate Payouts: examples/affiliate-payouts/README.md
      - Gaming: examples/gaming/README.md
      - Exchange: examples/exchange/README.md
      - Crypto Custody: examples/crypto-custody/README.md
      - Bank: examples/bank/README.md
      - Payment System (PSP): examples/payment-system-psp/README.md
      - Insurance: examples/insurance/README.md
      - Payroll: examples/payroll/README.md
      - Credit / BNPL: examples/credit-bnpl/README.md
      - Card Issuer: examples/card-issuer/README.md
      - Remittance: examples/remittance/README.md
      - Travel Booking: examples/travel-booking/README.md
      - Referral Program: examples/referral-program/README.md
      - Ad Network: examples/ad-network/README.md
      - Telecom Prepaid: examples/telecom-prepaid/README.md
      - Loyalty Bonuses: examples/loyalty-bonuses/README.md
  - Производительность:
      - Отчёт pgbench (2026-03-04): pgbench_benchmark_report_2026-03-04.md

markdown_extensions:
  - admonition
  - tables
  - toc:
      permalink: true
